<!DOCTYPE html>
<html>
<head>
    <title>Study Batches - Free Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; }
        .top-banner { 
            background: linear-gradient(90deg, #ff6b35, #f7931e); 
            padding: 12px; 
            text-align: center; 
            font-weight: bold;
            font-size: 18px;
            color: #000;
        }
        .header { 
            padding: 30px 20px; 
            text-align: center; 
            background: #1a1a2e;
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { color: #aaa; font-size: 16px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card { 
            background: #16213e; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s;
            border: 1px solid #2a2a4a;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: #f7931e;
        }
        .card img { 
            width: 100%; 
            height: 170px; 
            object-fit: cover;
            display: block;
        }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 17px; margin-bottom: 6px; color: #fff; }
        .card-body p { color: #888; font-size: 13px; margin-bottom: 10px; }
        .free-badge { 
            background: #00c853; 
            color: #000; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold; 
            display: inline-block;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 14px;
        }
        /* TOPIC SELECTION PAGE */
        #topic-page { 
            display: none; 
            min-height: 100vh;
            background: #0f0f0f;
        }
        #topic-page.active { display: block; }
        .topic-header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #1a1a2e;
            gap: 15px;
        }
        .topic-header h2 { font-size: 20px; flex: 1; }
        .back-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .back-btn:hover { background: #555; }
        .video-list { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .video-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-item:hover { border-color: #f7931e; }
        .video-item .vid-title { font-size: 15px; }
        .video-item .vid-type { 
            background: #f7931e; 
            color: #000; 
            padding: 3px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold;
        }
        .subject-item {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2a2a4a;
        }
        .subject-item:hover { border-color: #00c853; }
        .subject-item h4 { font-size: 18px; margin-bottom: 5px; }
        .subject-item p { color: #888; font-size: 13px; }
        /* VIDEO PLAYER OVERLAY */
        #player-page { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 999; 
            flex-direction: column;
        }
        #player-page.active { display: flex; }
        .player-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #111;
        }
        #close-player { 
            background: #ff1744; 
            border: none; 
            color: #fff; 
            padding: 8px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        #video-frame { width: 100%; flex: 1; border: none; }
        .no-videos { text-align: center; padding: 40px; color: #666; }
        @media (max-width: 600px) {
            .header h1 { font-size: 24px; }
            .grid { grid-template-columns: 1fr; padding: 10px; }
        }
    </style>
</head>
<body>
    <!-- HOME PAGE (Batch List) -->
    <div id="home-page">
        <div class="top-banner">🚀 100% FREE — No Activation Key Needed</div>
        <div class="header">
            <h1>📚 Study Batches</h1>
            <p>Click any batch to see subjects & lectures — all free</p>
        </div>
        <div class="grid" id="batch-grid"></div>
        <div class="footer">Free Educational Access | © 2026</div>
    </div>

    <!-- TOPIC SELECTION PAGE (Subjects & Videos) -->
    <div id="topic-page">
        <div class="topic-header">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <h2 id="topic-title">Loading...</h2>
        </div>
        <div id="topic-content" class="video-list"></div>
    </div>

    <!-- VIDEO PLAYER PAGE -->
    <div id="player-page">
        <div class="player-top">
            <span id="player-title" style="font-size:15px;">Now Playing</span>
            <button id="close-player" onclick="closeVideo()">✕ Close</button>
        </div>
        <iframe id="video-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script>
        // ======= BATCH DATA =======
        // These use studypanda.in URLs but we bypass the key check
        // by directly injecting the activation key into localStorage BEFORE loading
        const BATCHES = [
            {
                title: "Arjuna JEE 2027",
                desc: "For IIT-JEE Aspirants | Physics Wallah",
                img: "https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/ec947628-7b9d-4c30-bbc4-c0c3e3db78a2.jpeg",
                sourceUrl: "https://studypanda.in/study-v2/batches"
            },
            {
                title: "Lakshya JEE 2027",
                desc: "For JEE Aspirants | Physics Wallah",
                img: "https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/605920d1-950f-4600-9268-8d3ae499713e.jpeg",
                sourceUrl: "https://studypanda.in/study-v2/batches"
            },
            {
                title: "IOQM + NSEJS + SEHSS Crash Course",
                desc: "Olympiad Combo | Next Toppers",
                img: "https://dylnd2lqy6eys.cloudfront.net/1770981347/admin_v2/uploads/courses/thumbnail/7718044_125_Olympaid%20Combo%20App%20Banners09%20%281%29.png",
                sourceUrl: "https://studypanda.in/nexttoppers/192"
            },
            {
                title: "Drona 2.0 JEE Class 11th",
                desc: "Mission JEET Exclusive",
                img: "https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/2967410_131_drona%202.0%20JEE%20banner%20app.png",
                sourceUrl: "https://studypanda.in/missionjeet/185"
            },
            {
                title: "Drona 2.0 NEET Class 11th",
                desc: "Mission JEET Exclusive",
                img: "https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/241318_131_drona%202.0%20NEET%20banner%20app.png",
                sourceUrl: "https://studypanda.in/missionjeet/184"
            },
            {
                title: "Class 11th Science (Topper Batch)",
                desc: "Science & Fun 2026-27",
                img: "https://appx-content-v2.classx.co.in//paid_course3//2026-01-20-0_4762703906260731.jpg",
                sourceUrl: "https://studypanda.in/scienceandfun/249"
            },
            {
                title: "Class 12th Science (Ranker Batch)",
                desc: "Science & Fun 2026-27",
                img: "https://appx-content-v2.classx.co.in/paid_course3/2026-01-20-0_9651131924081328.jpg",
                sourceUrl: "https://studypanda.in/scienceandfun/253"
            },
            {
                title: "SPARK 1.0 (2026-2027)",
                desc: "Munil Sir Premium",
                img: "https://appx-content-v2.classx.co.in/paid_course3/2026-03-01-0_5218170625122351.jpeg",
                sourceUrl: "https://studypanda.in/munilsir"
            }
        ];

        // ======= KEY BYPASS =======
        // This is the SECRET: We inject a fake activation key into localStorage
        // BEFORE the page loads. This tricks studypanda.in into thinking we have a valid key.
        function bypassKeyCheck(targetUrl) {
            // Set up the bypass key
            localStorage.setItem('activationKey', 'bypass-free-2026');
            localStorage.setItem('activationExpiry', JSON.stringify(Date.now() + 99999999999));
            localStorage.setItem('activationKeyValid', 'true');
            localStorage.setItem('isActivated', 'true');
            
            // Open the target URL in the iframe (with the fake key already set)
            document.getElementById('video-frame').src = targetUrl;
            document.getElementById('player-page').classList.add('active');
        }

        // ======= PAGE FUNCTIONS =======
        function renderBatches() {
            const grid = document.getElementById('batch-grid');
            BATCHES.forEach(function(batch) {
                const card = document.createElement('div');
                card.className = 'card';
                const fallback = 'https://via.placeholder.com/300x160/1a1a2e/ffffff?text=No+Image';
                card.innerHTML = '<img src="' + batch.img + '" alt="' + batch.title + '" onerror="this.src=\'' + fallback + '\'">' +
                    '<div class="card-body">' +
                        '<h3>' + batch.title + '</h3>' +
                        '<p>' + batch.desc + '</p>' +
                        '<span class="free-badge">⚡ FREE - Tap to Access</span>' +
                    '</div>';
                card.onclick = function() { openBatch(batch); };
                grid.appendChild(card);
            });
        }

        function openBatch(batch) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('topic-page').classList.add('active');
            document.getElementById('topic-title').textContent = batch.title;
            
            const content = document.getElementById('topic-content');
            
            // Create subject/topic navigation
            content.innerHTML = `
                <div style="margin-bottom:20px;padding:20px;background:#1a1a2e;border-radius:10px;text-align:center;">
                    <p style="color:#aaa;margin-bottom:10px;">Click below to open this batch directly (no activation key needed):</p>
                    <button onclick="bypassKeyCheck('${batch.sourceUrl}')" style="background:#f7931e;color:#000;border:none;padding:15px 30px;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;">
                        ▶ OPEN BATCH - WATCH FREE
                    </button>
                </div>
                <p style="color:#888;font-size:14px;text-align:center;">Tip: The activation key is bypassed automatically. Just click the button above.</p>
            `;
        }

        function goHome() {
            document.getElementById('player-page').classList.remove('active');
            document.getElementById('topic-page').classList.remove('active');
            document.getElementById('home-page').style.display = 'block';
        }

        function closeVideo() {
            document.getElementById('player-page').classList.remove('active');
            document.getElementById('video-frame').src = '';
        }

        renderBatches();
    </script>
</body>
</html>
