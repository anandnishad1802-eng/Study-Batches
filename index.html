    let currentFilter = 'all';

    function renderBatches(filter) {
        const grid = document.getElementById('batchGrid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? BATCHES : BATCHES.filter(b => b.provider === filter);
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#666;grid-column:1/-1;"><p style="font-size:20px;margin-bottom:8px;">📭 No batches found</p><p>Check back later for new content.</p></div>';
            return;
        }
        filtered.forEach(function(batch) {
            const card = document.createElement('div');
            card.className = 'card';
            const fallback = 'https://via.placeholder.com/300x160/1a1a2e/ffffff?text=' + encodeURIComponent(batch.title);
            card.innerHTML =
                '<img src="' + batch.img + '" alt="' + batch.title.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.src=\'' + fallback + '\'">' +
                '<div class="card-body">' +
                    '<span class="provider-tag">' + batch.tag + '</span>' +
                    '<h3>' + batch.title + '</h3>' +
                    '<p>' + batch.desc + '</p>' +
                    '<div class="meta">' +
                        '<span class="free-badge">⚡ FREE - No Key Needed</span>' +
                        '<span style="color:#555;font-size:11px;">🔓 Open →</span>' +
                    '</div>' +
                '</div>';
            card.onclick = function() { openPlayer(batch.url); };
            grid.appendChild(card);
        });
    }

    function openPlayer(url) {
        document.getElementById('playerOverlay').classList.add('active');
        document.getElementById('video-frame').src = url;
    }

    function closePlayer() {
        document.getElementById('playerOverlay').classList.remove('active');
        document.getElementById('video-frame').src = '';
    }

    // Filter navigation
    document.querySelectorAll('.nav-tab').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.nav-tab').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderBatches(currentFilter);
        });
    });

    // Keyboard shortcut: press ESC to close player
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePlayer();
    });

    // Initial render
    renderBatches('all');
