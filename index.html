<!DOCTYPE html>
<html>
<head>
    <title>Free Study Hub - No Activation Key Needed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; }
        .top-banner { 
            background: linear-gradient(90deg, #ff6b35, #f7931e); 
            padding: 12px; 
            text-align: center; 
            font-weight: bold;
            font-size: 18px;
            color: #000;
        }
        .header { 
            padding: 30px 20px; 
            text-align: center; 
            background: #1a1a2e;
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { color: #aaa; font-size: 16px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card { 
            background: #16213e; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s;
            border: 1px solid #2a2a4a;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: #f7931e;
        }
        .card img { 
            width: 100%; 
            height: 170px; 
            object-fit: cover;
            display: block;
        }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 17px; margin-bottom: 6px; color: #fff; }
        .card-body p { color: #888; font-size: 13px; margin-bottom: 10px; }
        .free-badge { 
            background: #00c853; 
            color: #000; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold; 
            display: inline-block;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 14px;
        }
        /* Player overlay */
        #player-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
        }
        #player-overlay.active { display: flex; flex-direction: column; }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a1a2e;
        }
        .player-header span { font-size: 16px; font-weight: bold; }
        #player-close { 
            background: #ff1744; 
            border: none; 
            color: #fff; 
            padding: 8px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
        }
        #player-close:hover { background: #d50000; }
        #video-frame { 
            width: 100%; 
            flex: 1;
            border: none; 
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 24px; }
            .grid { grid-template-columns: 1fr; padding: 10px; }
            .card img { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="top-banner">🚀 NO ACTIVATION KEY NEEDED — 100% FREE ACCESS</div>
    
    <div class="header">
        <h1>📚 Free Study Hub</h1>

        <p style="font-size: 13px; color: #666; margin-top: 5px;">
            Click any batch below to start watching instantly

    </div>

    <div class="grid" id="batch-grid"></div>

    <div class="footer">

    <!-- Player Overlay -->

        <div class="player-header">

        // Show all batches on the page
        function renderBatches() {
            const grid = document.getElementById('batch-grid');
            
            BATCHES.forEach(function(batch, index) {
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = '<img src="' + batch.img + '" alt="' + batch.title + '" onerror="this.src=\'https://via.placeholder.com/300x160/1a1a2e/ffffff?text=No+Image\'">' +
                    '<div class="card-body">' +
                        '<h3>' + batch.title + '</h3>' +
                        '<p>' + batch.desc + '</p>' +
                        '<span class="free-badge">⚡ FREE - No Key Needed</span>' +
                    '</div>';
                
                card.onclick = function() { openPlayer(batch.sourceUrl); };
                
                grid.appendChild(card);
            });
        }

        function openPlayer(url) {
            document.getElementById('player-overlay').classList.add('active');
            document.getElementById('video-frame').src = url;
        }

        function closePlayer() {
            document.getElementById('player-overlay').classList.remove('active');
            document.getElementById('video-frame').src = '';
        }

        renderBatches();
    </script>

</html>
